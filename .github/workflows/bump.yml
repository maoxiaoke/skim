name: Bump & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z). Leave empty to auto-increment patch.'
        required: false
        default: ''

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          INPUT="${{ inputs.version }}"
          if [[ -z "$INPUT" ]]; then
            CURRENT=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            V="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Auto-incrementing $CURRENT → $V"
          else
            V="$INPUT"
          fi
          if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be X.Y.Z (got '$V')" && exit 1
          fi
          if git rev-parse "v$V" &>/dev/null 2>&1; then
            echo "Error: tag v$V already exists" && exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Bump versions
        run: |
          V="${{ steps.ver.outputs.version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" src-tauri/tauri.conf.json
          sed -i "1,/^version = /s/^version = \"[^\"]*\"/version = \"$V\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" package.json

      - name: Commit & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml package.json
          git commit -m "chore: release v${{ steps.ver.outputs.version }}"
          git push
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"
