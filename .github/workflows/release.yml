name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest   # Apple Silicon
            target: aarch64-apple-darwin
            arch: aarch64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12

          # Create keychain, prevent auto-lock (21600s = 6h)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import cert + private key, grant codesign access
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make it the default and only search path
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          # Extract hash of imported cert and use it as signing identity (avoids string matching)
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          CERT_HASH=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | awk '{print $2}')
          echo "Cert hash: $CERT_HASH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "APPLE_SIGNING_IDENTITY=$CERT_HASH" >> $GITHUB_ENV

      - name: Write notarization API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode \
            > ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: List bundle output
        run: |
          echo "=== bundle/ ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle/ -type f | sort

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skim-${{ matrix.arch }}
          if-no-files-found: warn
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: skim-aarch64
          path: artifacts/aarch64

      - name: Generate latest.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO="${{ github.repository }}"
          TAG="${GITHUB_REF_NAME}"

          ARM_TAR=$(ls artifacts/aarch64/*.app.tar.gz | head -1)
          ARM_SIG=$(cat artifacts/aarch64/*.app.tar.gz.sig)
          ARM_URL="https://github.com/$REPO/releases/download/$TAG/$(basename $ARM_TAR)"

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See full release notes at https://github.com/$REPO/releases/tag/$TAG",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "$ARM_URL",
                "signature": "$ARM_SIG"
              }
            }
          }
          EOF
          cat latest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Skim ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/aarch64/*.dmg
            artifacts/aarch64/*.app.tar.gz
            artifacts/aarch64/*.app.tar.gz.sig
            latest.json
