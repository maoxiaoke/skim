<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Geist:wght@400;500;600&amp;family=Geist+Mono:wght@400;500;600&amp;display=swap');
    text { font-family: 'Geist', system-ui, sans-serif; }
    .serif { font-family: 'Instrument Serif', Georgia, 'Songti SC', serif; }
    .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6E6E73"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#007AFF"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- header -->
  <text x="48" y="44" class="mono" font-size="8" fill="#9A9AA0" letter-spacing="0.16em">SKIM · TECH DESIGN · 02</text>
  <text x="48" y="80" class="serif" font-size="28" fill="#1A1A1A">Disable 操作时序 — 以 Codex 技能为例</text>
  <text x="48" y="104" font-size="12" fill="#6E6E73">原生配置写入，不动技能文件 · Claude 技能同构（settings.json + skillOverrides）</text>

  <!-- ===== lifelines ===== -->
  <line x1="136" y1="168" x2="136" y2="608" stroke="rgba(26,26,26,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="312" y1="168" x2="312" y2="608" stroke="rgba(26,26,26,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="488" y1="168" x2="488" y2="608" stroke="rgba(26,26,26,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="664" y1="168" x2="664" y2="608" stroke="rgba(26,26,26,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="840" y1="168" x2="840" y2="608" stroke="rgba(26,26,26,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== activation bars ===== -->
  <rect x="308" y="200" width="8" height="384" fill="rgba(26,26,26,0.06)" stroke="#6E6E73" stroke-width="0.8"/>
  <rect x="484" y="304" width="8" height="24" fill="rgba(26,26,26,0.06)" stroke="#6E6E73" stroke-width="0.8"/>
  <rect x="660" y="240" width="8" height="24" fill="rgba(26,26,26,0.06)" stroke="#6E6E73" stroke-width="0.8"/>
  <rect x="660" y="368" width="8" height="120" fill="rgba(26,26,26,0.06)" stroke="#6E6E73" stroke-width="0.8"/>

  <!-- ===== messages ===== -->
  <!-- 1 toggle -->
  <line x1="140" y1="200" x2="304" y2="200" stroke="#6E6E73" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="164" y="184" width="116" height="12" rx="2" fill="#FFFFFF"/>
  <text x="222" y="193" class="mono" font-size="8" fill="#6E6E73" text-anchor="middle" letter-spacing="0.06em">TOGGLE OFF pdf</text>

  <!-- 2 read config -->
  <line x1="316" y1="240" x2="656" y2="240" stroke="#6E6E73" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="352" y="224" width="96" height="12" rx="2" fill="#FFFFFF"/>
  <text x="400" y="233" class="mono" font-size="8" fill="#6E6E73" text-anchor="middle" letter-spacing="0.06em">READ CONFIG</text>

  <!-- 3 raw toml (return) -->
  <line x1="656" y1="264" x2="316" y2="264" stroke="#6E6E73" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="528" y="248" width="72" height="12" rx="2" fill="#FFFFFF"/>
  <text x="564" y="257" class="mono" font-size="8" fill="#9A9AA0" text-anchor="middle" letter-spacing="0.06em">RAW TOML</text>

  <!-- 4 plan disable -->
  <line x1="316" y1="304" x2="480" y2="304" stroke="#6E6E73" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="344" y="288" width="104" height="12" rx="2" fill="#FFFFFF"/>
  <text x="396" y="297" class="mono" font-size="8" fill="#6E6E73" text-anchor="middle" letter-spacing="0.06em">PLAN DISABLE</text>

  <!-- 5 config patch (return) -->
  <line x1="480" y1="328" x2="316" y2="328" stroke="#6E6E73" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="344" y="312" width="104" height="12" rx="2" fill="#FFFFFF"/>
  <text x="396" y="321" class="mono" font-size="8" fill="#9A9AA0" text-anchor="middle" letter-spacing="0.06em">CONFIG PATCH</text>

  <!-- 6 apply patch -->
  <line x1="316" y1="368" x2="656" y2="368" stroke="#6E6E73" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="352" y="352" width="96" height="12" rx="2" fill="#FFFFFF"/>
  <text x="400" y="361" class="mono" font-size="8" fill="#6E6E73" text-anchor="middle" letter-spacing="0.06em">APPLY PATCH</text>

  <!-- 7 backup -->
  <line x1="668" y1="408" x2="836" y2="408" stroke="#6E6E73" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="716" y="392" width="64" height="12" rx="2" fill="#FFFFFF"/>
  <text x="748" y="401" class="mono" font-size="8" fill="#6E6E73" text-anchor="middle" letter-spacing="0.06em">BACKUP</text>

  <!-- 8 surgical write (ACCENT) -->
  <line x1="668" y1="448" x2="836" y2="448" stroke="#007AFF" stroke-width="1" marker-end="url(#arrow-accent)"/>
  <rect x="692" y="432" width="120" height="12" rx="2" fill="#FFFFFF"/>
  <text x="752" y="441" class="mono" font-size="8" fill="#007AFF" text-anchor="middle" letter-spacing="0.06em">SURGICAL WRITE</text>

  <!-- 9 ok (return) -->
  <line x1="656" y1="488" x2="316" y2="488" stroke="#6E6E73" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="548" y="472" width="32" height="12" rx="2" fill="#FFFFFF"/>
  <text x="564" y="481" class="mono" font-size="8" fill="#9A9AA0" text-anchor="middle" letter-spacing="0.06em">OK</text>

  <!-- 10 self: rescan -->
  <path d="M 316 528 L 356 528 L 356 548 L 320 548" fill="none" stroke="#6E6E73" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="368" y="542" class="mono" font-size="8" fill="#6E6E73" letter-spacing="0.06em">RESCAN STATE</text>

  <!-- 11 feedback (return) -->
  <line x1="304" y1="584" x2="144" y2="584" stroke="#6E6E73" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="160" y="568" width="128" height="12" rx="2" fill="#FFFFFF"/>
  <text x="224" y="577" class="mono" font-size="8" fill="#9A9AA0" text-anchor="middle" letter-spacing="0.06em">ROW OFF · TOAST</text>

  <!-- ===== actor boxes (drawn after lines) ===== -->
  <rect x="64" y="128" width="144" height="40" rx="6" fill="#FFFFFF"/>
  <rect x="64" y="128" width="144" height="40" rx="6" fill="rgba(110,110,115,0.10)" stroke="#9A9AA0" stroke-width="1"/>
  <text x="136" y="152" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">用户</text>

  <rect x="240" y="128" width="144" height="40" rx="6" fill="#FFFFFF"/>
  <rect x="240" y="128" width="144" height="40" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1"/>
  <text x="312" y="148" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">UI + IO Adapter</text>
  <text x="312" y="162" class="mono" font-size="8" fill="#6E6E73" text-anchor="middle">react · webview</text>

  <rect x="416" y="128" width="144" height="40" rx="6" fill="#FFFFFF"/>
  <rect x="416" y="128" width="144" height="40" rx="6" fill="rgba(0,122,255,0.08)" stroke="#007AFF" stroke-width="1"/>
  <text x="488" y="148" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Domain Core</text>
  <text x="488" y="162" class="mono" font-size="8" fill="#6E6E73" text-anchor="middle">纯函数 · 零 IO</text>

  <rect x="592" y="128" width="144" height="40" rx="6" fill="#FFFFFF"/>
  <rect x="592" y="128" width="144" height="40" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1"/>
  <text x="664" y="148" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Rust Commands</text>
  <text x="664" y="162" class="mono" font-size="8" fill="#6E6E73" text-anchor="middle">toml_edit · backup</text>

  <rect x="768" y="128" width="144" height="40" rx="6" fill="#FFFFFF"/>
  <rect x="768" y="128" width="144" height="40" rx="6" fill="rgba(26,26,26,0.05)" stroke="#6E6E73" stroke-width="1"/>
  <text x="840" y="148" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">磁盘</text>
  <text x="840" y="162" class="mono" font-size="8" fill="#6E6E73" text-anchor="middle">config.toml · ~/.skim</text>

  <!-- editorial aside -->
  <text x="480" y="644" class="serif" font-size="14" font-style="italic" fill="#6E6E73" text-anchor="middle">写入前先备份到 ~/.skim/backups；toml_edit 保留用户注释，临时文件原子替换防半写。</text>

  <!-- ===== legend ===== -->
  <line x1="48" y1="664" x2="912" y2="664" stroke="rgba(26,26,26,0.10)" stroke-width="0.8"/>
  <text x="48" y="688" class="mono" font-size="8" fill="#6E6E73" letter-spacing="0.14em">LEGEND</text>
  <line x1="128" y1="684" x2="168" y2="684" stroke="#6E6E73" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="176" y="688" font-size="10" fill="#6E6E73">调用</text>
  <line x1="232" y1="684" x2="272" y2="684" stroke="#6E6E73" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="280" y="688" font-size="10" fill="#6E6E73">返回</text>
  <line x1="336" y1="684" x2="376" y2="684" stroke="#007AFF" stroke-width="1" marker-end="url(#arrow-accent)"/>
  <text x="384" y="688" font-size="10" fill="#6E6E73">关键安全步骤</text>
</svg>
