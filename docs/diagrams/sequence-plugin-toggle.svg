<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 640" width="820" height="640">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Geist:wght@400;500;600&amp;family=Geist+Mono:wght@400;500;600&amp;display=swap');
    text { font-family: 'Geist', system-ui, sans-serif; }
    .serif { font-family: 'Instrument Serif', Georgia, serif; }
    .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
    </marker>
    <marker id="arrow-return" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- header -->
  <text x="40" y="36" class="mono" font-size="8" fill="#7a8399" letter-spacing="0.16em">SKIM · TECH DESIGN · 03</text>
  <text x="40" y="68" class="serif" font-size="28" fill="#2d3142">插件级开关时序</text>
  <text x="40" y="92" font-size="12" fill="#4f5d75">跳过 ConfirmDialog，直接执行；修改 enabledPlugins / [plugins.*]，不触碰技能文件</text>

  <!-- ===== actor boxes ===== -->
  <!-- actor centers: UI=120, Store=280, IO=440, Rust=600, Disk=760 -->

  <!-- UI -->
  <rect x="64" y="112" width="112" height="40" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="120" y="136" font-size="12" font-weight="600" fill="#2d3142" text-anchor="middle">UI</text>

  <!-- Store (focal) -->
  <rect x="224" y="112" width="112" height="40" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="280" y="136" font-size="12" font-weight="600" fill="#2d3142" text-anchor="middle">Store</text>

  <!-- IO Adapter -->
  <rect x="384" y="112" width="112" height="40" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="440" y="136" font-size="12" font-weight="600" fill="#2d3142" text-anchor="middle">IO Adapter</text>

  <!-- Rust Commands -->
  <rect x="544" y="112" width="112" height="40" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="600" y="136" font-size="12" font-weight="600" fill="#2d3142" text-anchor="middle">Rust Commands</text>

  <!-- Disk -->
  <rect x="704" y="112" width="112" height="40" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
  <text x="760" y="136" font-size="12" font-weight="600" fill="#2d3142" text-anchor="middle">Disk</text>

  <!-- ===== lifelines ===== -->
  <line x1="120" y1="152" x2="120" y2="560" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="280" y1="152" x2="280" y2="560" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="152" x2="440" y2="560" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="600" y1="152" x2="600" y2="560" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="760" y1="152" x2="760" y2="560" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== messages (arrows drawn before activation bars) ===== -->

  <!-- 1. User clicks toggle → UI → Store.togglePlugin -->
  <line x1="120" y1="196" x2="272" y2="196" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
  <rect x="168" y="184" width="72" height="12" rx="2" fill="#f5f5f5"/>
  <text x="204" y="193" class="mono" font-size="8" fill="#eb6c36" text-anchor="middle" letter-spacing="0.06em">TOGGLE</text>

  <!-- 2. Store → planTogglePlugin (domain) — self-loop on Store -->
  <path d="M 288 220 Q 340 220 340 232 Q 340 244 288 244" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="296" y="224" width="56" height="12" rx="2" fill="#f5f5f5"/>
  <text x="324" y="233" class="mono" font-size="8" fill="#7a8399" text-anchor="middle" letter-spacing="0.06em">PLAN</text>

  <!-- 3. Store → IO.execute(plan) -->
  <line x1="288" y1="272" x2="432" y2="272" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="328" y="260" width="60" height="12" rx="2" fill="#f5f5f5"/>
  <text x="358" y="269" class="mono" font-size="8" fill="#7a8399" text-anchor="middle" letter-spacing="0.06em">EXECUTE</text>

  <!-- 4. IO → Rust read_text_files(settingsPath) -->
  <line x1="448" y1="308" x2="592" y2="308" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="484" y="296" width="68" height="12" rx="2" fill="#f5f5f5"/>
  <text x="518" y="305" class="mono" font-size="8" fill="#7a8399" text-anchor="middle" letter-spacing="0.06em">READ FILE</text>

  <!-- 5. Rust → Disk -->
  <line x1="608" y1="336" x2="752" y2="336" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="648" y="324" width="52" height="12" rx="2" fill="#f5f5f5"/>
  <text x="674" y="333" class="mono" font-size="8" fill="#7a8399" text-anchor="middle" letter-spacing="0.06em">READ</text>

  <!-- 6. Disk → Rust (return raw text, dashed) -->
  <line x1="752" y1="360" x2="608" y2="360" stroke="#4f5d75" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-return)"/>
  <rect x="650" y="348" width="52" height="12" rx="2" fill="#f5f5f5"/>
  <text x="676" y="357" class="mono" font-size="8" fill="#7a8399" text-anchor="middle" letter-spacing="0.06em">RAW</text>

  <!-- 7. IO → applyClaudePluginEnabled (domain patch) — self-loop on IO -->
  <path d="M 448 388 Q 504 388 504 400 Q 504 412 448 412" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="452" y="392" width="64" height="12" rx="2" fill="#f5f5f5"/>
  <text x="484" y="401" class="mono" font-size="8" fill="#7a8399" text-anchor="middle" letter-spacing="0.06em">PATCH</text>

  <!-- 8. IO → Rust write_claude_settings (atomic write) -->
  <line x1="448" y1="440" x2="592" y2="440" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="476" y="428" width="80" height="12" rx="2" fill="#f5f5f5"/>
  <text x="516" y="437" class="mono" font-size="8" fill="#7a8399" text-anchor="middle" letter-spacing="0.06em">ATOMIC WRITE</text>

  <!-- 9. Rust → Disk (backup + rename) -->
  <line x1="608" y1="464" x2="752" y2="464" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="640" y="452" width="84" height="12" rx="2" fill="#f5f5f5"/>
  <text x="682" y="461" class="mono" font-size="8" fill="#7a8399" text-anchor="middle" letter-spacing="0.06em">BACKUP·RENAME</text>

  <!-- 10. Store refreshes UI (accent return) -->
  <line x1="272" y1="504" x2="128" y2="504" stroke="#eb6c36" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-accent)"/>
  <rect x="172" y="492" width="56" height="12" rx="2" fill="#f5f5f5"/>
  <text x="200" y="501" class="mono" font-size="8" fill="#eb6c36" text-anchor="middle" letter-spacing="0.06em">RE-RENDER</text>

  <!-- ===== activation bars ===== -->
  <rect x="276" y="188" width="8" height="324" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="0.8"/>
  <rect x="436" y="264" width="8" height="204" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
  <rect x="596" y="300" width="8" height="188" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>

  <!-- ===== legend ===== -->
  <line x1="40" y1="580" x2="780" y2="580" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
  <text x="40" y="600" class="mono" font-size="8" fill="#4f5d75" letter-spacing="0.14em">LEGEND</text>
  <rect x="108" y="592" width="12" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="128" y="602" font-size="10" fill="#4f5d75">主调用路径（插件开关）</text>
  <rect x="344" y="592" width="12" height="12" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="364" y="602" font-size="10" fill="#4f5d75">组件</text>
  <line x1="456" y1="598" x2="476" y2="598" stroke="#4f5d75" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="484" y="602" font-size="10" fill="#4f5d75">返回值 / 异步</text>
  <line x1="600" y1="598" x2="620" y2="598" stroke="#4f5d75" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="628" y="602" font-size="10" fill="#4f5d75">生命线</text>
</svg>
