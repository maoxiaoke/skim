<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim S monogram, open terminals">
  <defs>
    <linearGradient id="tileFill" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markFill" x1="190" y1="366" x2="322" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FC9B7"/><stop offset="1" stop-color="#2E7DFF"/>
    </linearGradient>
  </defs>
  <g id="tile">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tileFill)"/>
    <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>
  <!-- more open, geometric-sans terminals (less curl) -->
  <path id="mark" fill="none" stroke="url(#markFill)" stroke-width="48" stroke-linecap="round"
        d="M 316 160 C 250 132, 196 158, 196 206 C 196 240, 228 250, 256 256 C 284 262, 316 272, 316 306 C 316 354, 262 380, 196 352"/>
</svg>
