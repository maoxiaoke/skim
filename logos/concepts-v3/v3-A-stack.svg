<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim stacked-skills app icon">
  <defs>
    <linearGradient id="tileFill" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markFill" x1="140" y1="320" x2="392" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FC9B7"/>
      <stop offset="1" stop-color="#2E7DFF"/>
    </linearGradient>
  </defs>

  <g id="tile">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tileFill)"/>
    <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>

  <g id="mark">
    <!-- a fanned stack of skill cards; front card is the active one you've skimmed to -->
    <rect x="181" y="168" width="194" height="82" rx="22" fill="url(#markFill)" opacity="0.28"/>
    <rect x="159" y="209" width="194" height="82" rx="22" fill="url(#markFill)" opacity="0.55"/>
    <rect x="137" y="250" width="194" height="82" rx="22" fill="url(#markFill)"/>
  </g>
</svg>
