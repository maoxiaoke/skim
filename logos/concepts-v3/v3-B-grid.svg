<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim skill-grid app icon">
  <defs>
    <linearGradient id="tileFill" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markFill" x1="126" y1="386" x2="386" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FC9B7"/>
      <stop offset="1" stop-color="#2E7DFF"/>
    </linearGradient>
  </defs>

  <g id="tile">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tileFill)"/>
    <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>

  <!-- 4x4 library of skills; one selected/active -->
  <g id="mark" fill="url(#markFill)">
    <g opacity="0.16">
      <rect x="126" y="126" width="56" height="56" rx="15"/>
      <rect x="194" y="126" width="56" height="56" rx="15"/>
      <rect x="330" y="126" width="56" height="56" rx="15"/>
      <rect x="126" y="194" width="56" height="56" rx="15"/>
      <rect x="194" y="194" width="56" height="56" rx="15"/>
      <rect x="262" y="194" width="56" height="56" rx="15"/>
      <rect x="330" y="194" width="56" height="56" rx="15"/>
      <rect x="126" y="262" width="56" height="56" rx="15"/>
      <rect x="194" y="262" width="56" height="56" rx="15"/>
      <rect x="262" y="262" width="56" height="56" rx="15"/>
      <rect x="330" y="262" width="56" height="56" rx="15"/>
      <rect x="126" y="330" width="56" height="56" rx="15"/>
      <rect x="194" y="330" width="56" height="56" rx="15"/>
      <rect x="262" y="330" width="56" height="56" rx="15"/>
      <rect x="330" y="330" width="56" height="56" rx="15"/>
    </g>
    <!-- the active skill: top-right cell, full strength -->
    <rect x="262" y="126" width="56" height="56" rx="15"/>
  </g>
</svg>
