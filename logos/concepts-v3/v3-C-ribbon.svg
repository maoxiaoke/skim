<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim S-ribbon app icon">
  <defs>
    <linearGradient id="tileFill" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markFill" x1="180" y1="330" x2="332" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FC9B7"/>
      <stop offset="1" stop-color="#2E7DFF"/>
    </linearGradient>
  </defs>

  <g id="tile">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tileFill)"/>
    <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>

  <!-- geometric S monogram built from a single ribbon stroke -->
  <g id="mark" fill="none" stroke="url(#markFill)" stroke-width="48" stroke-linecap="round">
    <path d="M 332 178
             C 332 140 288 130 252 144
             C 210 160 210 216 256 232
             C 302 248 304 304 262 320
             C 226 334 182 324 180 286"/>
  </g>
</svg>
