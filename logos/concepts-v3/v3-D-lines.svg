<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim skim-lines app icon">
  <defs>
    <linearGradient id="tileFill" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markFill" x1="146" y1="366" x2="366" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FC9B7"/>
      <stop offset="1" stop-color="#2E7DFF"/>
    </linearGradient>
  </defs>

  <g id="tile">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tileFill)"/>
    <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>

  <!-- a content panel with text lines being skimmed (white cutouts) -->
  <g id="mark">
    <rect x="146" y="146" width="220" height="220" rx="52" fill="url(#markFill)"/>
    <g fill="#FFFFFF">
      <rect x="182" y="190" width="148" height="16" rx="8"/>
      <rect x="182" y="226" width="148" height="16" rx="8"/>
      <rect x="182" y="262" width="104" height="16" rx="8"/>
      <rect x="182" y="298" width="130" height="16" rx="8"/>
    </g>
  </g>
</svg>
