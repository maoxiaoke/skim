<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim capability-hub app icon">
  <defs>
    <linearGradient id="tileFill" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markFill" x1="150" y1="360" x2="392" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FC9B7"/>
      <stop offset="1" stop-color="#2E7DFF"/>
    </linearGradient>
  </defs>

  <g id="tile">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tileFill)"/>
    <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>

  <!-- one manager orchestrating many skills -->
  <g id="mark">
    <g stroke="url(#markFill)" stroke-width="9" stroke-linecap="round" opacity="0.55">
      <line x1="256" y1="256" x2="156" y2="158"/>
      <line x1="256" y1="256" x2="372" y2="166"/>
      <line x1="256" y1="256" x2="388" y2="306"/>
      <line x1="256" y1="256" x2="296" y2="392"/>
      <line x1="256" y1="256" x2="150" y2="356"/>
    </g>
    <g fill="url(#markFill)">
      <circle cx="156" cy="158" r="20"/>
      <circle cx="372" cy="166" r="17"/>
      <circle cx="388" cy="306" r="15"/>
      <circle cx="296" cy="392" r="17"/>
      <circle cx="150" cy="356" r="16"/>
      <circle cx="256" cy="256" r="40"/>
    </g>
  </g>
</svg>
