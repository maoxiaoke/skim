<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim stone-ripple app icon">
  <defs>
    <linearGradient id="tileFill" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markFill" x1="150" y1="360" x2="392" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FC9B7"/>
      <stop offset="1" stop-color="#2E7DFF"/>
    </linearGradient>
  </defs>

  <g id="tile">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tileFill)"/>
    <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>

  <!-- a skimmed stone (top-right) and the ripples it leaves -->
  <g id="mark">
    <g fill="none" stroke="url(#markFill)" stroke-linecap="round">
      <circle cx="244" cy="278" r="44" stroke-width="16"/>
      <circle cx="244" cy="278" r="84" stroke-width="11" opacity="0.55"/>
      <circle cx="244" cy="278" r="124" stroke-width="7" opacity="0.3"/>
    </g>
    <circle cx="356" cy="166" r="22" fill="url(#markFill)"/>
    <line x1="338" y1="184" x2="276" y2="246" stroke="url(#markFill)" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
