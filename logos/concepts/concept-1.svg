<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim crescent app icon">
  <defs>
    <linearGradient id="tileGrad" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="150" y1="372" x2="372" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FC9B7"/>
      <stop offset="1" stop-color="#2E7DFF"/>
    </linearGradient>
    <!-- Crescent = outer disc minus an offset inner disc, opening toward upper-right -->
    <mask id="crescentMask" maskUnits="userSpaceOnUse" x="0" y="0" width="512" height="512">
      <rect x="0" y="0" width="512" height="512" fill="#000000"/>
      <circle cx="246" cy="266" r="148" fill="#FFFFFF"/>
      <circle cx="318" cy="194" r="130" fill="#000000"/>
    </mask>
  </defs>

  <g id="tile">
    <rect x="2" y="2" width="508" height="508" rx="112" fill="url(#tileGrad)"/>
    <rect x="2.5" y="2.5" width="507" height="507" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>

  <g id="mark">
    <!-- barely-there soft offset under the mark -->
    <g mask="url(#crescentMask)" opacity="0.10">
      <rect x="96" y="120" width="304" height="304" fill="#1B2A4A"/>
    </g>
    <g mask="url(#crescentMask)">
      <rect x="96" y="116" width="304" height="304" fill="url(#markGrad)"/>
    </g>
  </g>
</svg>
