<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim crescent icon">
  <defs>
    <linearGradient id="tileGrad" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="256" y1="116" x2="256" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A3F47"/>
      <stop offset="1" stop-color="#1A1D22"/>
    </linearGradient>
    <mask id="crescentMask">
      <rect x="0" y="0" width="512" height="512" fill="black"/>
      <circle cx="252" cy="262" r="140" fill="white"/>
      <circle cx="318" cy="194" r="128" fill="black"/>
    </mask>
  </defs>

  <g id="tile">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tileGrad)"/>
    <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>

  <g id="mark">
    <rect x="0" y="0" width="512" height="512" fill="url(#markGrad)" mask="url(#crescentMask)"/>
  </g>
</svg>
