<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skim app icon">
  <defs>
    <linearGradient id="tileGrad" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="150" y1="150" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4DA2FF"/>
      <stop offset="1" stop-color="#007AFF"/>
    </linearGradient>
    <clipPath id="discClip">
      <circle cx="256" cy="256" r="148"/>
