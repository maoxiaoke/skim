  </defs>

  <g id="tile">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tileGrad)"/>
    <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" fill="none" stroke="#E2E6EC" stroke-width="1"/>
  </g>

  <g id="mark">
    <g clip-path="url(#discClip)">
      <path d="M 108 256
               A 148 148 0 0 0 404 256
               L 404 188
               C 354 222 304 234 256 234
               C 208 234 158 222 108 188
               Z"
            fill="url(#markGrad)"/>
